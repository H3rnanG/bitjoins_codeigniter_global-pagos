services:
  mysql:
    image: mysql:8.0
    container_name: gp-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: dbGlobalCaluladora
      MYSQL_USER: usAppCalc
      MYSQL_PASSWORD: rFe9yShDg6KSWG5zvOim
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - app-network

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: gp-php
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=gp-mysql
      - DB_NAME=dbGlobalCaluladora
      - DB_USER=usAppCalc
      - DB_PASS=rFe9yShDg6KSWG5zvOim
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: gp-nginx
    restart: always
    depends_on:
      - php
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data: